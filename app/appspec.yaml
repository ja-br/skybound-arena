# Consumed by the CodeDeploy ECS blue/green action. CodeDeploy substitutes
# <TASK_DEFINITION> with the revision registered from taskdef.json, stands
# up a green task set, health-checks /healthz, then shifts ALB traffic.
version: 0.0
Resources:
  - TargetService:
      Type: AWS::ECS::Service
      Properties:
        TaskDefinition: <TASK_DEFINITION>
        LoadBalancerInfo:
          ContainerName: "skybound-api"
          ContainerPort: 8080
